                <button onClick={()=>setBuddyStep('results')} className="text-gray-400 text-lg">←</button>
                <div className="relative">
                  <div className="w-10 h-10 rounded-full flex items-center justify-center text-xl bg-gray-100">{activeBuddy.avatar}</div>
                  {activeBuddy.online && <div className="absolute bottom-0 right-0 w-3 h-3 bg-green-400 rounded-full border-2 border-white" />}
                </div>
                <div>
                  <p className="font-bold text-gray-800 text-sm">{activeBuddy.name}</p>
                  <p className="text-xs" style={{color:'#22C55E'}}>{activeBuddy.match}% match · {activeBuddy.online?'Online':'Offline'}</p>
                </div>
              </div>

              {/* Messages */}
              <div className="flex-1 overflow-y-auto space-y-3 mb-3" style={{minHeight:0}}>
                <div className="bg-amber-50 border border-amber-100 rounded-xl p-2.5 flex gap-2">
                  <span className="text-xs">🔒</span>
                  <p className="text-amber-600 text-xs">Private chat — your personal details are protected. Be kind and supportive!</p>
                </div>
                {chatMessages.map(m=>(
                  <div key={m.id} className={`flex ${m.from==='me'?'flex-row-reverse':''} items-end gap-2`}>
                    {m.from==='buddy' && (
                      <div className="w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center text-base flex-shrink-0">{activeBuddy.avatar}</div>
                    )}
                    <div className="max-w-xs px-4 py-2.5 rounded-2xl text-sm leading-relaxed"
                      style={m.from==='me'?{background:pc,color:'white',borderBottomRightRadius:4}:{background:'white',border:'1px solid #F3F4F6',color:'#374151',borderBottomLeftRadius:4}}>
                      {m.text}
                    </div>
                  </div>
                ))}
              </div>

              {/* Quick replies */}
              <div className="flex gap-2 overflow-x-auto no-scroll pb-2">
                {['👋 Hey!','💜 Sending love!','🙏 Thank you!','That really helps!'].map(s=>(
                  <button key={s} onClick={()=>{setChatInput(s);}}
                    className="flex-shrink-0 text-xs px-3 py-1.5 rounded-xl border whitespace-nowrap"
                    style={{background:pc+'10',color:pc,borderColor:pc+'30'}}>
                    {s}
                  </button>
                ))}
              </div>

              {/* Input */}
              <div className="flex gap-2 bg-gray-100 rounded-2xl p-1.5">
                <input value={chatInput} onChange={e=>setChatInput(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&sendChat()}
                  placeholder="Message your buddy…"
                  className="flex-1 bg-transparent px-3 py-2 text-gray-700 text-sm" />
                <button onClick={sendChat}
                  className="w-10 h-10 rounded-xl flex items-center justify-center text-white flex-shrink-0"
                  style={{background:pc}}>
                  ➤
                </button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};
/* ═══════════════════════════════════════════
   DOCTOR PDF EXPORT
═══════════════════════════════════════════ */
const generateDoctorPDF = (profile) => {
  const { jsPDF } = window.jspdf;
  const doc  = new jsPDF();
  const pc   = [124, 58, 237]; // purple RGB
  const gray = [100, 100, 100];
  const dark = [30, 30, 30];
  const today = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  let y = 0;

  const addPage = () => { doc.addPage(); y = 20; };
  const checkY = (needed=20) => { if (y + needed > 275) addPage(); };

  /* ── Header banner ── */
  doc.setFillColor(...pc);
  doc.rect(0, 0, 210, 38, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(20); doc.setFont('helvetica','bold');
  doc.text('EczemaEase', 14, 16);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('Skin Journal Report — Generated for Healthcare Provider', 14, 24);
  doc.text(`Generated: ${today}`, 14, 31);
  y = 50;

  /* ── Patient details box ── */
  doc.setFillColor(245, 243, 255);
  doc.roundedRect(12, y-6, 186, 30, 3, 3, 'F');
  doc.setTextColor(...dark); doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text(`${profile.name}  ${profile.emoji||''}`, 18, y+4);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
  doc.text(`Relationship: ${profile.relationship}   Age: ${profile.age}   Report covers: ${profile.logs.length} log entries`, 18, y+12);
  y += 34;

  /* ── Disclaimer ── */
  doc.setFillColor(255, 251, 235);
  doc.roundedRect(12, y, 186, 12, 2, 2, 'F');
  doc.setTextColor(146, 64, 14); doc.setFontSize(7.5); doc.setFont('helvetica','italic');
  doc.text('⚕  This report is for informational purposes only and is not a substitute for professional medical diagnosis or advice.', 16, y+8);
  y += 20;

  /* ── Section helper ── */
  const sectionTitle = (title) => {
    checkY(14);
    doc.setFillColor(...pc);
    doc.rect(12, y, 4, 10, 'F');
    doc.setTextColor(...pc); doc.setFontSize(12); doc.setFont('helvetica','bold');
    doc.text(title, 20, y+7);
    y += 16;
  };

  /* ── Stat row helper ── */
  const statRow = (label, val, valColor=dark) => {
    checkY(10);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...gray);
    doc.text(label, 18, y);
    doc.setFont('helvetica','bold'); doc.setTextColor(...valColor);
    doc.text(String(val), 90, y);
    y += 8;
  };

  /* ── 1. Summary Stats ── */
  sectionTitle('Summary');
  const avg = profile.logs.length
    ? (profile.logs.reduce((s,l)=>s+l.severity,0)/profile.logs.length).toFixed(1)
    : 'N/A';
  const severe  = profile.logs.filter(l=>l.severity>=7).length;
  const moderate= profile.logs.filter(l=>l.severity>=4&&l.severity<7).length;
  const mild    = profile.logs.filter(l=>l.severity<4).length;
  const upcoming= profile.appointments.filter(a=>a.upcoming).length;

  statRow('Total Logs Recorded:', profile.logs.length);
  statRow('Average Severity Score:', `${avg} / 10`, avg>=7?[239,68,68]:avg>=4?[245,158,11]:[34,197,94]);
  statRow('Severe Days (7–10):', severe, [239,68,68]);
  statRow('Moderate Days (4–6):', moderate, [245,158,11]);
  statRow('Mild Days (1–3):', mild, [34,197,94]);
  statRow('Upcoming Appointments:', upcoming);
  statRow('Saved Products:', profile.savedProducts.length);
  y += 4;

  /* ── 2. Recent Logs ── */
  sectionTitle('Recent Skin Logs (Last 10)');
  if (profile.logs.length === 0) {
    doc.setTextColor(...gray); doc.setFontSize(9); doc.setFont('helvetica','italic');
    doc.text('No logs recorded yet.', 18, y); y += 10;
  } else {
    // Table header
    doc.setFillColor(124, 58, 237);
    doc.rect(12, y-5, 186, 10, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
    doc.text('Date',     16, y+1);
    doc.text('Severity', 46, y+1);
    doc.text('Mood',     72, y+1);
    doc.text('Areas',    90, y+1);
    doc.text('Triggers', 135, y+1);
    y += 10;

    profile.logs.slice(0,10).forEach((log,i) => {
      checkY(10);
      if (i%2===0) { doc.setFillColor(248,246,255); doc.rect(12,y-4,186,9,'F'); }
      const sevColor = log.severity>=7?[239,68,68]:log.severity>=4?[245,158,11]:[34,197,94];
      doc.setFont('helvetica','normal'); doc.setFontSize(8);
      doc.setTextColor(...dark);   doc.text(log.date,                                    16, y+1);
      doc.setTextColor(...sevColor);doc.setFont('helvetica','bold');
      doc.text(`${log.severity}/10`,                                                      46, y+1);
      doc.setTextColor(...dark);   doc.setFont('helvetica','normal');
      doc.text(log.mood||'—',                                                             72, y+1);
      doc.text((log.areas||[]).slice(0,2).join(', ')||(log.areas||[]).join(', ')||'—',  90, y+1);
      doc.text((log.triggers||[]).slice(0,2).map(t=>t.split(' ').slice(1).join(' ')).join(', ')||'None', 135, y+1);
      y += 9;
    });
    y += 4;
  }

  /* ── 3. Trigger Analysis ── */
  sectionTitle('Trigger Frequency Analysis');
  const triggerMap = {};
  profile.logs.forEach(l=>(l.triggers||[]).forEach(t=>{
    triggerMap[t] = (triggerMap[t]||0)+1;
  }));
  const sortedTrigs = Object.entries(triggerMap).sort((a,b)=>b[1]-a[1]);

  if (sortedTrigs.length === 0) {
    doc.setTextColor(...gray); doc.setFontSize(9); doc.setFont('helvetica','italic');
    doc.text('No triggers logged yet.', 18, y); y += 10;
  } else {
    sortedTrigs.forEach(([trigger, count]) => {
      checkY(10);
      const pct = Math.round((count / profile.logs.length) * 100);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dark);
      doc.text(trigger, 18, y);
      doc.setTextColor(...gray);
      doc.text(`${count} occurrences (${pct}% of logs)`, 90, y);
      // Mini bar
      doc.setFillColor(229,231,235);
      doc.rect(148, y-4, 46, 5, 'F');
      doc.setFillColor(...pc);
      doc.rect(148, y-4, Math.max(2, 46*(pct/100)), 5, 'F');
      y += 9;
    });
    y += 4;
  }

  /* ── 4. Most Affected Body Areas ── */
  sectionTitle('Most Affected Body Areas');
  const areaMap = {};
  profile.logs.forEach(l=>(l.areas||[]).forEach(a=>{ areaMap[a]=(areaMap[a]||0)+1; }));
  const sortedAreas = Object.entries(areaMap).sort((a,b)=>b[1]-a[1]);
  if (sortedAreas.length === 0) {
    doc.setTextColor(...gray); doc.setFontSize(9); doc.setFont('helvetica','italic');
    doc.text('No body areas logged yet.', 18, y); y += 10;
  } else {
    sortedAreas.forEach(([area, count]) => {
      checkY(9);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dark);
      doc.text(area, 18, y);
      doc.setTextColor(...gray);
      doc.text(`${count}x`, 90, y);
      y += 8;
    });
    y += 4;
  }

  /* ── 5. Appointments ── */
  sectionTitle('Appointment History');
  if (profile.appointments.length === 0) {
    doc.setTextColor(...gray); doc.setFontSize(9); doc.setFont('helvetica','italic');
    doc.text('No appointments recorded.', 18, y); y += 10;
  } else {
    profile.appointments.forEach(a => {
      checkY(18);
      doc.setFillColor(a.upcoming?245:248, a.upcoming?243:248, a.upcoming?255:248);
      doc.roundedRect(12, y-4, 186, 16, 2, 2, 'F');
      doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...dark);
      doc.text(`${a.type} — ${a.doctor}`, 16, y+2);
      doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
      doc.text(`${a.date} at ${a.time}  |  ${a.location||''}`, 16, y+8);
      if (a.upcoming) {
        doc.setTextColor(...pc); doc.setFont('helvetica','bold');
        doc.text('UPCOMING', 170, y+2);
      }
      y += 20;
    });
    y += 4;
  }

  /* ── 6. Saved Products ── */
  sectionTitle('Saved Product Safety Ratings');
  if (profile.savedProducts.length === 0) {
    doc.setTextColor(...gray); doc.setFontSize(9); doc.setFont('helvetica','italic');
    doc.text('No products saved yet.', 18, y); y += 10;
  } else {
    profile.savedProducts.forEach(p => {
      checkY(12);
      const rColor = p.rating==='safe'?[34,197,94]:p.rating==='caution'?[245,158,11]:[239,68,68];
      const rLabel = p.rating==='safe'?'✓ Safe':p.rating==='caution'?'⚠ Caution':'✕ Avoid';
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...dark);
      doc.text(p.name, 18, y);
      doc.setFont('helvetica','bold'); doc.setTextColor(...rColor);
      doc.text(rLabel, 150, y);
      doc.setFont('helvetica','normal'); doc.setTextColor(...gray); doc.setFontSize(8);
      doc.text(p.note||'', 18, y+5);
      y += 12;
    });
  }

  /* ── Footer on every page ── */
  const pageCount = doc.internal.getNumberOfPages();
  for (let i=1; i<=pageCount; i++) {
    doc.setPage(i);
    doc.setFillColor(...pc);
    doc.rect(0, 287, 210, 10, 'F');
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.text(`EczemaEase — ${profile.name}'s Skin Report — ${today}`, 14, 293);
    doc.text(`Page ${i} of ${pageCount}`, 185, 293, {align:'right'});
  }

  doc.save(`EczemaEase_${profile.name}_Report_${new Date().toISOString().split('T')[0]}.pdf`);
};

/* ═══════════════════════════════════════════
   ROOT APP
═══════════════════════════════════════════ */
const TABS = [
  {id:'home',      label:'Home',      emoji:'🏠'},
  {id:'track',     label:'Track',     emoji:'📊'},
  {id:'scan',      label:'Scan',      emoji:'🔍'},
  {id:'appts',     label:'Appts',     emoji:'📅'},
  {id:'community', label:'Community', emoji:'👥'},
  {id:'chat',      label:'Chat',      emoji:'💬'},
];


const App = () => {
  const [profiles,       setProfiles]       = useState(SEED_PROFILES);
  const [activeId,       setActiveId]       = useState(1);
  const [tab,            setTab]            = useState('home');
  const [showSwitcher,   setShowSwitcher]   = useState(false);
  const [showForm,       setShowForm]       = useState(false);
  const [editingProfile, setEditingProfile] = useState(null);

  const activeProfile = profiles.find(p=>p.id===activeId) || profiles[0];
  const pc = activeProfile.color;

  const updateActiveProfile = updater => {
    setProfiles(prev=>prev.map(p=>p.id===activeId?updater(p):p));
  };

  const addLog = log => {
    updateActiveProfile(p=>({
      ...p,
      logs:[{...log,id:Date.now(),date:new Date().toISOString().split('T')[0]},...p.logs]
    }));
  };

  const handleSaveProfile = data => {
    if (editingProfile) {
      setProfiles(prev=>prev.map(p=>p.id===editingProfile.id?{...p,...data}:p));
    } else {
      const newP = {...data, id:Date.now(), logs:[], appointments:[], savedProducts:[]};
      setProfiles(prev=>[...prev,newP]);
      setActiveId(newP.id);
    }
    setShowForm(false);
    setEditingProfile(null);
    setShowSwitcher(false);
  };

  const handleDeleteProfile = () => {
    if(profiles.length<=1) return;
    const remaining = profiles.filter(p=>p.id!==editingProfile.id);
    setProfiles(remaining);
    if(activeId===editingProfile.id) setActiveId(remaining[0].id);
    setShowForm(false);
    setEditingProfile(null);
  };

  const openEdit = profile => {
    setEditingProfile(profile);
    setShowForm(true);
    setShowSwitcher(false);
  };

  const openAdd = () => {
    setEditingProfile(null);
    setShowForm(true);
    setShowSwitcher(false);
  };

  const headerBg = `linear-gradient(135deg,${pc} 0%,${pc}BB 100%)`;

  return (
    <div className="app-shell">

      {/* ── DYNAMIC HEADER ── */}
      <div style={{background:headerBg}} className="px-5 pt-11 pb-4">
        {tab === 'home' ? (
          <div className="flex justify-between items-center">
            <div>
              <p className="text-white/70 text-sm">Managing eczema for</p>
              <h1 className="text-white text-2xl font-bold">{activeProfile.name} {activeProfile.emoji}</h1>
              <p className="text-white/60 text-xs mt-0.5">{activeProfile.relationship} · {activeProfile.age}</p>
            </div>
            {/* Profile switcher button */}
            <button onClick={()=>setShowSwitcher(true)} className="flex flex-col items-center gap-0.5 active:scale-95">
              <div className="relative w-13 h-13 flex items-center justify-center">
                <div className="w-12 h-12 rounded-full flex items-center justify-center text-2xl border-2 border-white/60"
                  style={{background:'rgba(255,255,255,0.2)'}}>
                  {activeProfile.emoji}
                </div>
                {/* Profile count badge */}
                {profiles.length > 1 && (
                  <div className="absolute -top-1 -right-1 w-5 h-5 bg-white rounded-full flex items-center justify-center text-xs font-black"
                    style={{color:pc}}>
                    {profiles.length}
                  </div>
                )}
              </div>
              <span className="text-white/60 text-xs font-medium">Switch</span>
            </button>
          </div>
        ) : (
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-full flex items-center justify-center text-xl border-2 border-white/30"
                style={{background:'rgba(255,255,255,0.2)'}}>
                {tab==='chat'?'🤖':TABS.find(t=>t.id===tab)?.emoji}
              </div>
              <div>
                <div className="text-white font-bold text-lg">
                  {tab==='chat'?'Eczema Assistant':TABS.find(t=>t.id===tab)?.label}
                </div>
                <div className="text-white/60 text-xs flex items-center gap-1.5">
                  {tab==='chat'&&<div className="w-1.5 h-1.5 bg-green-400 rounded-full"/>}
                  {tab==='chat'?'Online':''}
                  {tab!=='chat'&&`${activeProfile.name}'s tracker`}
                </div>
              </div>
            </div>
            {/* Mini profile switcher */}
            <button onClick={()=>setShowSwitcher(true)} className="flex items-center gap-2 active:scale-95">
              <div className="text-right">
                <div className="text-white text-xs font-semibold">{activeProfile.name}</div>
                {profiles.length > 1 && (
                  <div className="text-white/60 text-xs">{profiles.length} profiles</div>
                )}
              </div>
              <div className="relative">
                <div className="w-10 h-10 rounded-full flex items-center justify-center text-xl border-2 border-white/40"
                  style={{background:'rgba(255,255,255,0.2)'}}>
                  {activeProfile.emoji}
                </div>
                {profiles.length > 1 && (
                  <div className="absolute -top-1 -right-1 w-4 h-4 bg-white rounded-full flex items-center justify-center text-xs font-black"
                    style={{color:pc,fontSize:9}}>
                    {profiles.length}
                  </div>
                )}
              </div>
            </button>
          </div>
        )}
      </div>

      {/* ── CONTENT ── */}
      <div className="overflow-y-auto" style={{maxHeight:'calc(100vh - 65px)'}}>
        {tab==='home'  && <Dashboard    key={activeId} profile={activeProfile} onQuickLog={()=>setTab('track')} />}
        {tab==='track' && <Track        key={activeId} profile={activeProfile} onSave={addLog} />}
        {tab==='scan'  && <Scan         key={activeId} profile={activeProfile} onUpdateProfile={updateActiveProfile} />}
        {tab==='appts' && <Appointments key={activeId} profile={activeProfile} onUpdateProfile={updateActiveProfile} />}
                {tab==='community' && <Community key={activeId} profile={activeProfile} />}
        {tab==='chat'      && <Chat      key={activeId} profile={activeProfile} />}

      </div>

      {/* ── BOTTOM NAV ── */}
      <div className="fixed bottom-0 z-30 flex"
        style={{left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,
          background:'rgba(255,255,255,0.97)',backdropFilter:'blur(16px)',
          borderTop:'1px solid #f0f0f0',boxShadow:'0 -4px 24px rgba(0,0,0,0.08)',
          padding:'6px 6px 12px'}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)}
            className="flex-1 flex flex-col items-center py-1.5 rounded-2xl transition-all"
            style={tab===t.id?{background:pc+'18'}:{}}>
            <span style={{fontSize:22}}>{t.emoji}</span>
            <span style={{fontSize:10,marginTop:2,fontWeight:700,color:tab===t.id?pc:'#9CA3AF'}}>
              {t.label}
            </span>
            {tab===t.id && (
              <div className="w-1 h-1 rounded-full mt-0.5" style={{background:pc}} />
            )}
          </button>
        ))}
      </div>

      {/* ── PROFILE SWITCHER SHEET ── */}
      {showSwitcher && (
        <ProfileSwitcherSheet
          profiles={profiles}
          activeId={activeId}
          onSwitch={id=>{setActiveId(id);setShowSwitcher(false);}}
          onAdd={openAdd}
          onEdit={openEdit}
          onClose={()=>setShowSwitcher(false)}
        />
      )}

      {/* ── PROFILE FORM (Add / Edit) ── */}
      {showForm && (
        <ProfileForm
          profile={editingProfile}
          onSave={handleSaveProfile}
          onCancel={()=>{setShowForm(false);setEditingProfile(null);}}
          onDelete={handleDeleteProfile}
          isOnlyProfile={profiles.length<=1}
        />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
